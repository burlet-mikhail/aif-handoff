# PROD-overlay поверх docker-compose.yml. Запуск:
#   docker compose -f docker-compose.yml -f compose.production.yml up -d
#
# Переопределяет dev-послабления на prod-жёсткость. Теги !override / !reset
# ЗАМЕНЯЮТ значение из base (по умолчанию Compose слил бы списки).
#
# Архитектура:
#   - api/agent/mcp — один и тот же образ ghcr.io/burlet-dev/aif-handoff-app
#     (см. .docker/Dockerfile target `app`), сервисы отличаются только command.
#   - web — отдельный лёгкий образ ghcr.io/burlet-dev/aif-handoff-web (Angie + статика).
#   - TLS терминирует ХОСТОВЫЙ Traefik (external network `proxy`). web без портов
#     на хост, маршрутизация по docker.sock через Traefik labels.
#   - Bind-mounts: ${HOME}/aif/projects (репо рабочих проектов) + ${HOME}/aif/data
#     (SQLite, бэкапы). Путь из HOME → одинаков на любом сервере (cattle).

services:

  # ============================ api ====================================
  api:
    image: ghcr.io/burlet-dev/aif-handoff-app:${IMAGE_TAG:-latest}
    build: !reset null  # на сервере не собираем, тянем готовый образ из GHCR
    env_file: !override
      - ./env/aif.env.decrypted
    ports: !reset []
    environment: !override
      - DATABASE_URL=/data/aif.sqlite
      - PORT=3009
      - LOG_LEVEL=info
      - AIF_ENABLE_CODEX_LOGIN_PROXY=false
      - TMPDIR=/home/node/.claude/tmp
      - PROJECTS_MOUNT=/home/www
      # gh-аутентификация переживает рестарты, потому что лежит на persistent claude-auth volume.
      - GH_CONFIG_DIR=/home/node/.claude/.gh
    volumes: !override
      - ${HOME}/aif/data:/data
      - ${HOME}/aif/projects:/home/www
      - claude-auth:/home/node/.claude
      - codex-auth:/home/node/.codex
    networks:
      - default
      - proxy
    restart: always
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 3G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3009/health'').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================ web (Angie + static) ===================
  web:
    image: ghcr.io/burlet-dev/aif-handoff-web:${IMAGE_TAG:-latest}
    build: !reset null
    # Порт наружу НЕ пробрасываем — снаружи трафик принимает Traefik и шлёт по
    # сети proxy. !reset убирает ports из base.
    ports: !reset []
    # Сразу запускаем angie без envsubst/SSL: Traefik сам терминирует TLS.
    entrypoint: !override
      - /bin/sh
      - -c
      - "mkdir -p /run/angie && cp /etc/angie/http.d/production.conf.template /etc/angie/http.d/default.conf && exec angie -g 'daemon off; worker_processes 2;'"
    volumes: !override []
    # Две сети:
    #   default — внутренняя сеть проекта (api/agent/mcp);
    #   proxy   — общая external-сеть с Traefik (создать один раз:
    #             docker network create proxy).
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      # Домен + HTTPS-entrypoint (websecure = :443, объявлен в стеке Traefik).
      - "traefik.http.routers.aif.rule=Host(`aif.burlet.dev`)"
      - "traefik.http.routers.aif.entrypoints=websecure"
      - "traefik.http.routers.aif.tls=true"
      - "traefik.http.routers.aif.tls.certresolver=letsencrypt"
      # Порт КОНТЕЙНЕРА, куда Traefik проксирует.
      - "traefik.http.services.aif.loadbalancer.server.port=80"
      # web в нескольких сетях — явно указываем Traefik ходить через proxy.
      - "traefik.docker.network=proxy"
    depends_on:
      api:
        condition: service_healthy
    restart: always
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/cache/angie:size=50m
      - /run:size=10m
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================ agent ==================================
  agent:
    image: ghcr.io/burlet-dev/aif-handoff-app:${IMAGE_TAG:-latest}
    build: !reset null
    command: ["npx", "tsx", "packages/agent/src/index.ts"]
    env_file: !override
      - ./env/aif.env.decrypted
    environment: !override
      - DATABASE_URL=/data/aif.sqlite
      - API_BASE_URL=http://api:3009
      - AGENT_BYPASS_PERMISSIONS=true
      - LOG_LEVEL=info
      - AIF_ENABLE_CODEX_LOGIN_PROXY=false
      - TMPDIR=/home/node/.claude/tmp
      - PROJECTS_MOUNT=/home/www
      - GH_CONFIG_DIR=/home/node/.claude/.gh
    volumes: !override
      - ${HOME}/aif/data:/data
      - ${HOME}/aif/projects:/home/www
      - claude-auth:/home/node/.claude
      - codex-auth:/home/node/.codex
    depends_on:
      api:
        condition: service_healthy
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 6G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ============================ mcp ====================================
  mcp:
    image: ghcr.io/burlet-dev/aif-handoff-app:${IMAGE_TAG:-latest}
    build: !reset null
    command: ["npx", "tsx", "packages/mcp/src/index.ts"]
    env_file: !override
      - ./env/aif.env.decrypted
    ports: !reset []
    environment: !override
      - DATABASE_URL=/data/aif.sqlite
      - MCP_TRANSPORT=http
      - MCP_PORT=3100
      - LOG_LEVEL=info
      - PROJECTS_MOUNT=/home/www
    volumes: !override
      - ${HOME}/aif/data:/data
      - ${HOME}/aif/projects:/home/www
      # entrypoint требует /home/node/.claude и .codex существующими и writable —
      # без них read_only rootfs валит контейнер в restart-loop.
      - claude-auth:/home/node/.claude
      - codex-auth:/home/node/.codex
    depends_on:
      api:
        condition: service_healthy
    restart: always
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3100/health'').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  claude-auth:
  codex-auth:

# Внешняя сеть с ХОСТОВЫМ Traefik. Создаётся ОДИН раз вне этого compose:
#   docker network create proxy
# external: true — Compose её не создаёт и не удаляет, только подключается.
networks:
  proxy:
    external: true
