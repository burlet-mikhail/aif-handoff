server {
    listen 80;

    # Static assets — never fall back to index.html
    location /assets/ {
        root /usr/share/angie/html;
        try_files $uri =404;
        access_log off;
    }

    # SPA catch-all
    location / {
        root /usr/share/angie/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /ws {
        proxy_pass http://api:3009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://api:3009/;
    }
}
