# Production Angie config — TLS терминирует ХОСТОВЫЙ Traefik. Сюда трафик
# приходит уже расшифрованным по docker-сети `proxy`. Поэтому здесь только
# listen 80, без SSL/ACME/envsubst. WS-апгрейд для /ws обязателен.
server {
    listen 80;
    server_name _;

    # Health-probe для docker healthcheck (wget --spider).
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Static assets — never fall back to index.html (avoids text/html MIME error)
    location /assets/ {
        root /usr/share/angie/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA catch-all
    location / {
        root /usr/share/angie/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /ws {
        proxy_pass http://api:3009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://api:3009/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
