# Production Angie config — TLS терминирует ХОСТОВЫЙ Traefik. Сюда трафик
# приходит уже расшифрованным по docker-сети `proxy`. Поэтому здесь только
# listen 80, без SSL/ACME/envsubst. WS-апгрейд для /ws обязателен.
server {
    listen 80;
    server_name _;

    # Явная загрузка MIME-типов в server-контексте: Safari отказывается
    # выполнять ES-модули если Content-Type не application/javascript.
    # Дефолтный http-блок Angie Alpine включает mime.types, но мы
    # дублируем здесь на случай расхождения версий образа.
    include /etc/angie/mime.types;
    default_type application/octet-stream;

    root /usr/share/angie/html;

    # Health-probe для docker healthcheck (wget --spider).
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Hashed-ассеты Vite — иммутабельный кеш, никогда не фолбечить на index.html.
    # Без этого блока try_files в catch-all отдаёт index.html с Content-Type: text/html,
    # Safari блокирует: "TypeError: 'text/html' is not a valid JavaScript MIME type".
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA catch-all: отдаём index.html для клиентского роутинга.
    # no-cache на HTML — после ребилда браузер всегда получит свежий index.html
    # с актуальными хешами ассетов, не кешированный с прошлого деплоя.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /index.html;
    }

    location /ws {
        proxy_pass http://api:3009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://api:3009/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
